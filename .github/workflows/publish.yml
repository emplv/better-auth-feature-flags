name: Publish to npm

# Publishes the version currently committed to package.json on the triggered ref.
# Version bumps happen in PRs (alongside CHANGELOG), not in this workflow.
# This is required because branch protection on `main` rejects direct pushes from CI.
on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag (e.g. latest, next)"
        required: true
        default: "latest"

permissions:
  contents: write # needed to push the version tag back to the repo
  id-token: write # required for npm trusted publishing (OIDC)
  actions: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          registry-url: "https://registry.npmjs.org"

      # npm trusted publishing requires a recent npm CLI; install latest in CI.
      - name: Upgrade npm CLI
        run: npm i -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read package version
        id: pkg
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag (if missing)
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin; skipping create + push."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Publish to npm (OIDC)
        env:
          NPM_CONFIG_PROVENANCE: "true"
          DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          npm publish --tag "$DIST_TAG" --provenance
